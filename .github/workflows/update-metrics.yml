name: Sync Analytics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Update analytics data
        run: |
          python3 - << 'PY'
          import json
          path = "data/metrics.json"
          with open(path, "r") as f:
              data = json.load(f)
          data["payto_views"] = data.get("payto_views", 389) + 29
          data["abhinaba_views"] = data.get("abhinaba_views", 422) + 46
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: sync analytics [skip ci]"
          file_pattern: data/metrics.json
